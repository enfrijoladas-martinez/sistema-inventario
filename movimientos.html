<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Movimientos</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
</head>

<body class="p-4">

<h3>Movimientos de Inventario</h3>

<button class="btn btn-primary mb-3" data-toggle="modal" data-target="#modalMovimiento">
  + Nuevo Movimiento
</button>

<table class="table table-bordered">
  <thead>
    <tr>
      <th>Fecha</th>
      <th>Almacén</th>
      <th>Producto</th>
      <th>Tipo</th>
      <th>Cantidad</th>
      <th>Acciones</th>
    </tr>
  </thead>
  <tbody id="tablaMovimientos"></tbody>
</table>

<!-- MODAL -->
<div class="modal fade" id="modalMovimiento">
  <div class="modal-dialog">
    <div class="modal-content p-3">

      <h5>Nuevo Movimiento</h5>

      <input type="date" id="fecha" class="form-control mb-2">

      <select id="almacen" class="form-control mb-2"></select>

      <select id="producto" class="form-control mb-2"></select>

      <select id="tipo" class="form-control mb-2">
        <option value="entrada">Entrada</option>
        <option value="salida">Salida</option>
      </select>

      <input type="number" id="cantidad" class="form-control mb-2" placeholder="Cantidad">

      <button id="guardarMovimiento" class="btn btn-success">Guardar</button>

    </div>
  </div>
</div>

<!-- MODAL DETALLE -->
<div class="modal fade" id="modalDetalle">
  <div class="modal-dialog">
    <div class="modal-content p-3" id="detalleContenido"></div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

<script src="movimientos.js"></script>

</body>
</html>
